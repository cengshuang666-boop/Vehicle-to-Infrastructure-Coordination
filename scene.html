<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>车路协同AI仿真数据生成平台 - 三维场景</title>
  <style>
    :root {
      --bg-deep: #0d1117;
      --bg-card: #161b22;
      --bg-hover: #21262d;
      --border: #30363d;
      --text-primary: #c9d1d9;
      --text-secondary: #8b949e;
      --accent: #2f81f7;
      --accent-hover: #58a6ff;
      --green: #238636;
      --green-text: #3fb950;
      --red: #da3633;
      --red-text: #f85149;
      --yellow: #9e8c00;
      --yellow-text: #d29922;
      --tag-bg: rgba(47,129,247,0.15);
      --tag-text: #58a6ff;
      --sidebar-active: rgba(47,129,247,0.12);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,"Noto Sans SC",sans-serif; background:var(--bg-deep); color:var(--text-primary); font-size:14px; }
    a { text-decoration:none; color:inherit; }
    .topbar { display:flex; align-items:center; justify-content:space-between; padding:0 24px; height:56px; background:var(--bg-card); border-bottom:1px solid var(--border); position:fixed; top:0; left:0; right:0; z-index:100; }
    .topbar-left { display:flex; align-items:center; gap:32px; }
    .logo { display:flex; align-items:center; gap:8px; font-size:16px; font-weight:600; color:var(--text-primary); }
    .logo-icon { width:28px; height:28px; background:var(--accent); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:14px; }
    .topnav { display:flex; gap:28px; }
    .topnav a { font-size:14px; color:var(--text-secondary); padding:18px 0; border-bottom:2px solid transparent; transition:.2s; }
    .topnav a:hover, .topnav a.active { color:var(--text-primary); border-bottom-color:var(--accent); }
    .topnav a.active { color:var(--accent-hover); }
    .topbar-right { display:flex; align-items:center; gap:12px; color:var(--text-secondary); font-size:13px; }
    .user-avatar { width:28px; height:28px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:12px; }
    .sidebar { position:fixed; top:56px; left:0; width:210px; height:calc(100vh - 56px); background:var(--bg-card); border-right:1px solid var(--border); overflow-y:auto; z-index:90; }
    .sidebar-group { padding:12px 0; border-bottom:1px solid var(--border); }
    .sidebar-group:last-child { border-bottom:none; }
    .sidebar-item { display:flex; align-items:center; gap:10px; padding:10px 20px; font-size:13px; color:var(--text-secondary); cursor:pointer; transition:.15s; }
    .sidebar-item:hover { background:var(--bg-hover); color:var(--text-primary); }
    .sidebar-item.active { background:var(--sidebar-active); color:var(--accent-hover); border-left:3px solid var(--accent); padding-left:17px; }
    .sidebar-item svg { width:16px; height:16px; flex-shrink:0; }
    .main { margin-left:210px; margin-top:56px; padding:24px; min-height:calc(100vh - 56px); }
    .content { max-width:1200px; }
    .btn { display:inline-flex; align-items:center; gap:6px; padding:9px 18px; border-radius:6px; font-size:14px; cursor:pointer; border:none; transition:.15s; font-weight:500; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-primary:hover { background:var(--accent-hover); }
    .btn-secondary { background:var(--bg-hover); color:var(--text-primary); border:1px solid var(--border); }
    .btn-secondary:hover { background:var(--border); }
    .btn-success { background:var(--green); color:#fff; }
    .btn-success:hover { background:#2ea043; }
    .btn-danger { background:var(--red); color:#fff; }
    .panel { background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:20px; }
    .panel-title { font-size:15px; font-weight:600; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; }
    .tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:12px; font-weight:500; }
    .tag-blue { background:var(--tag-bg); color:var(--tag-text); }
    .tag-green { background:rgba(35,134,54,0.15); color:var(--green-text); }
    .tag-yellow { background:rgba(217,165,20,0.15); color:var(--yellow-text); }
    .tag-red { background:rgba(218,54,51,0.15); color:var(--red-text); }

    .page-title { font-size:22px; font-weight:600; margin-bottom:4px; }
    .page-desc { color:var(--text-secondary); font-size:13px; margin-bottom:20px; }
    .scene-preview { height:240px; background:var(--bg-hover); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:64px; margin-bottom:20px; border:1px solid var(--border); }
    .form-group { margin-bottom:20px; }
    .form-label { display:block; font-size:13px; font-weight:500; margin-bottom:8px; }
    .form-input, .form-select {
      width:100%; max-width:400px; background:var(--bg-hover); border:1px solid var(--border); border-radius:6px;
      padding:10px 14px; color:var(--text-primary); font-size:14px; outline:none; transition:.15s;
    }
    .form-input:focus, .form-select:focus { border-color:var(--accent); }
    .param-row { display:grid; grid-template-columns:repeat(3, 1fr); gap:16px; }

  </style>
</head>

<!-- 主内容 -->
<main class="main">
  <div class="content">
    <h1 class="page-title">🧊 三维场景</h1>
    <p class="page-desc">生成 GLB 格式三维交通场景，支持导入主流仿真引擎</p>

    <div class="scene-preview">🧊</div>

    <div class="panel">
      <div class="panel-title">场景配置</div>
      <div class="param-row">
        <div class="form-group">
          <label class="form-label">场景模板</label>
          <select class="form-select"><option>城市交叉路口</option><option>高速公路直道</option><option>环岛多车道</option><option>高架匝道</option><option>学校区域</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">时间光照</label>
          <select class="form-select"><option>正午晴天</option><option>黄昏</option><option>夜间路灯</option><option>阴天漫射</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">路面材质</label>
          <select class="form-select"><option>标准沥青</option><option>潮湿路面</option><option>积雪路面</option><option>施工砂石</option></select>
        </div>
      </div>
      <div class="param-row">
        <div class="form-group">
          <label class="form-label">车道数量</label>
          <select class="form-select"><option>2车道</option><option>3车道</option><option selected>4车道</option><option>6车道</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">交通设施</label>
          <select class="form-select"><option>完整信号灯</option><option>仅标志牌</option><option>临时施工</option><option>无设施</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">植被覆盖</label>
          <select class="form-select"><option>无</option><option>少量</option><option selected>标准</option><option>茂密</option></select>
        </div>
      </div>
      <div style="margin-top:10px;">
        <button class="btn btn-primary" id="gen-btn" onclick="startGenerate()">🚀 生成三维场景</button>
        <button class="btn btn-secondary" style="margin-left:8px;" id="import-btn" onclick="importOpenDrive()">📤 导入 OpenDRIVE</button>
        <input type="file" id="import-input" accept=".xodr,.xml" style="display:none;" onchange="handleImport(event)">
        <div class="progress-wrap" id="progress-wrap" style="margin-top:16px;display:none;">
          <div class="progress-bar" style="height:8px;background:var(--bg-hover);border-radius:4px;overflow:hidden;"><div class="progress-fill" id="progress-fill" style="height:100%;background:var(--accent);width:0%;transition:width 0.3s;border-radius:4px;"></div></div>
          <div class="progress-text" id="progress-text" style="font-size:12px;color:var(--text-secondary);margin-top:6px;">准备生成...</div>
        </div>
        <div class="gen-result" id="gen-result" style="margin-top:16px;padding:12px 16px;background:rgba(35,134,54,0.1);border:1px solid rgba(35,134,54,0.3);border-radius:6px;color:var(--green-text);font-size:13px;display:none;"></div>
      </div>
    </div>

  </div>
</main>

<script>

  function saveToAudit(typeName, count) {
    const data = JSON.parse(localStorage.getItem('auditQueue') || '[]');
    const now = new Date();
    const dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
    const timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    const maxNum = data.reduce((max, item) => {
      const m = item.id.match(/SIM-(\d{8})-(\d+)/);
      return m ? Math.max(max, parseInt(m[2])) : max;
    }, 0);
    const baseNum = Math.max(maxNum, 8);
    for (let i = 0; i < count; i++) {
      const num = String(baseNum + i + 1).padStart(3, '0');
      data.push({
        id: 'SIM-' + dateStr.replace(/-/g,'') + '-' + num,
        type: typeName,
        time: dateStr + ' ' + timeStr,
        status: '待审核'
      });
    }
    // Save quality scores
    const qualityData = JSON.parse(localStorage.getItem('qualityData') || '{}');
    for (let i = 0; i < count; i++) {
      const num = String(baseNum + i + 1).padStart(3, '0');
      const qid = 'SIM-' + dateStr.replace(/-/g,'') + '-' + num;
      qualityData[qid] = {
        overall: (80 + Math.random() * 18).toFixed(1),
        physics: Math.floor(80 + Math.random() * 20),
        visual: Math.floor(75 + Math.random() * 25),
        annotation: Math.floor(85 + Math.random() * 15),
        diversity: Math.floor(70 + Math.random() * 30)
      };
    }
    localStorage.setItem('qualityData', JSON.stringify(qualityData));
    localStorage.setItem('auditQueue', JSON.stringify(data));
  }

  function startGenerate() {
    const btn = document.getElementById('gen-btn');
    const progressWrap = document.getElementById('progress-wrap');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const genResult = document.getElementById('gen-result');
    if (btn.disabled) return;
    btn.disabled = true;
    btn.innerHTML = '⏳ 生成中...';
    progressWrap.style.display = 'block';
    genResult.style.display = 'none';
    let progress = 0;
    progressFill.style.width = '0%';
    progressText.textContent = '准备生成...';
    const interval = setInterval(() => {
      progress += Math.random() * 10 + 3;
      if (progress > 100) progress = 100;
      progressFill.style.width = progress + '%';
      if (progress < 30) progressText.textContent = '正在构建道路拓扑...';
      else if (progress < 60) progressText.textContent = '正在生成材质与光照...';
      else if (progress < 90) progressText.textContent = '正在导出GLB格式...';
      else progressText.textContent = '即将完成...';
      if (progress >= 100) {
        clearInterval(interval);
        btn.disabled = false;
        btn.innerHTML = '🚀 生成三维场景';
        genResult.innerHTML = '✅ 生成完成！GLB 文件已就绪，大小约 128MB，可直接导入 Unity / Unreal';
        genResult.style.display = 'block';
        saveToAudit('三维交通场景', 1);
        setTimeout(() => { progressWrap.style.display = 'none'; }, 800);
      }
    }, 400);
  }
  function importOpenDrive() {
    document.getElementById('import-input').click();
  }
  function handleImport(e) {
    const file = e.target.files[0];
    if (file) {
      alert('已选择 OpenDRIVE 文件：' + file.name + '，导入解析成功');
    }
  }
</script>
