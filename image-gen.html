<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>车路协同AI仿真数据生成平台 - 道路仿真图像</title>
  <style>
    :root {
      --bg-deep: #0d1117;
      --bg-card: #161b22;
      --bg-hover: #21262d;
      --border: #30363d;
      --text-primary: #c9d1d9;
      --text-secondary: #8b949e;
      --accent: #2f81f7;
      --accent-hover: #58a6ff;
      --green: #238636;
      --green-text: #3fb950;
      --red: #da3633;
      --red-text: #f85149;
      --yellow: #9e8c00;
      --yellow-text: #d29922;
      --tag-bg: rgba(47,129,247,0.15);
      --tag-text: #58a6ff;
      --sidebar-active: rgba(47,129,247,0.12);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,"Noto Sans SC",sans-serif; background:var(--bg-deep); color:var(--text-primary); font-size:14px; }
    a { text-decoration:none; color:inherit; }
    .topbar { display:flex; align-items:center; justify-content:space-between; padding:0 24px; height:56px; background:var(--bg-card); border-bottom:1px solid var(--border); position:fixed; top:0; left:0; right:0; z-index:100; }
    .topbar-left { display:flex; align-items:center; gap:32px; }
    .logo { display:flex; align-items:center; gap:8px; font-size:16px; font-weight:600; color:var(--text-primary); }
    .logo-icon { width:28px; height:28px; background:var(--accent); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:14px; }
    .topnav { display:flex; gap:28px; }
    .topnav a { font-size:14px; color:var(--text-secondary); padding:18px 0; border-bottom:2px solid transparent; transition:.2s; }
    .topnav a:hover, .topnav a.active { color:var(--text-primary); border-bottom-color:var(--accent); }
    .topnav a.active { color:var(--accent-hover); }
    .topbar-right { display:flex; align-items:center; gap:12px; color:var(--text-secondary); font-size:13px; }
    .user-avatar { width:28px; height:28px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:12px; }
    .sidebar { position:fixed; top:56px; left:0; width:210px; height:calc(100vh - 56px); background:var(--bg-card); border-right:1px solid var(--border); overflow-y:auto; z-index:90; }
    .sidebar-group { padding:12px 0; border-bottom:1px solid var(--border); }
    .sidebar-group:last-child { border-bottom:none; }
    .sidebar-item { display:flex; align-items:center; gap:10px; padding:10px 20px; font-size:13px; color:var(--text-secondary); cursor:pointer; transition:.15s; }
    .sidebar-item:hover { background:var(--bg-hover); color:var(--text-primary); }
    .sidebar-item.active { background:var(--sidebar-active); color:var(--accent-hover); border-left:3px solid var(--accent); padding-left:17px; }
    .sidebar-item svg { width:16px; height:16px; flex-shrink:0; }
    .main { margin-left:210px; margin-top:56px; padding:24px; min-height:calc(100vh - 56px); }
    .content { max-width:1200px; }
    .btn { display:inline-flex; align-items:center; gap:6px; padding:9px 18px; border-radius:6px; font-size:14px; cursor:pointer; border:none; transition:.15s; font-weight:500; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-primary:hover { background:var(--accent-hover); }
    .btn-secondary { background:var(--bg-hover); color:var(--text-primary); border:1px solid var(--border); }
    .btn-secondary:hover { background:var(--border); }
    .btn-success { background:var(--green); color:#fff; }
    .btn-success:hover { background:#2ea043; }
    .btn-danger { background:var(--red); color:#fff; }
    .panel { background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:20px; }
    .panel-title { font-size:15px; font-weight:600; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; }
    .tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:12px; font-weight:500; }
    .tag-blue { background:var(--tag-bg); color:var(--tag-text); }
    .tag-green { background:rgba(35,134,54,0.15); color:var(--green-text); }
    .tag-yellow { background:rgba(217,165,20,0.15); color:var(--yellow-text); }
    .tag-red { background:rgba(218,54,51,0.15); color:var(--red-text); }

    .page-title { font-size:22px; font-weight:600; margin-bottom:4px; }
    .page-desc { color:var(--text-secondary); font-size:13px; margin-bottom:20px; }
    .form-group { margin-bottom:20px; }
    .form-label { display:block; font-size:13px; font-weight:500; margin-bottom:8px; }
    .form-input, .form-select {
      width:100%; max-width:400px; background:var(--bg-hover); border:1px solid var(--border); border-radius:6px;
      padding:10px 14px; color:var(--text-primary); font-size:14px; outline:none; transition:.15s;
    }
    .form-input:focus, .form-select:focus { border-color:var(--accent); }
    .upload-area {
      width:100%; max-width:400px; min-height:120px; background:var(--bg-hover); border:2px dashed var(--border);
      border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:8px; cursor:pointer; transition:.15s; color:var(--text-secondary);
    }
    .upload-area:hover { border-color:var(--accent); color:var(--accent-hover); }
    .upload-icon { font-size:28px; }
    .param-row { display:grid; grid-template-columns:repeat(2, 1fr); gap:16px; }

  </style>
</head>
<body>

<!-- 顶部导航 -->

    </div>
    <nav class="topnav">

      <a href="quality.html">质量评价</a>

    </nav>
  </div>

</div>

<!-- 主内容 -->
<main class="main">
  <div class="content">
    <h1 class="page-title">🖼 道路仿真图像</h1>
    <p class="page-desc">生成交通场景仿真图像，支持多模态输入</p>

    <div class="panel">
      <div class="panel-title">输入素材（可选）</div>
      <div class="form-group">
        <div class="upload-area">
          <div class="upload-icon">+</div>
          <div style="font-size:13px;">点击上传实景图 / BEV特征图 / 语义分割图</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">生成配置</div>
      <div class="param-row">
        <div class="form-group">
          <label class="form-label">场景类型</label>
          <select class="form-select"><option>城市道路</option><option>高速公路</option><option>乡村道路</option><option>隧道</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">天气条件</label>
          <select class="form-select"><option>晴天</option><option>多云</option><option>雨天</option><option>雾天</option><option>雪天</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">时间</label>
          <select class="form-select"><option>白天</option><option>黄昏</option><option>夜间</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">生成数量</label>
          <input type="number" class="form-input" value="10">
        </div>
      </div>
      <div class="param-row">
        <div class="form-group">
          <label class="form-label">分辨率</label>
          <select class="form-select"><option>1280×720</option><option selected>1920×1080</option><option>2560×1440</option><option>3840×2160</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">输出格式</label>
          <select class="form-select"><option>PNG</option><option>JPG</option><option>TIFF</option></select>
        </div>
      </div>
      <button class="btn btn-primary">🚀 开始生成</button>
    </div>

  </div>
</main>
